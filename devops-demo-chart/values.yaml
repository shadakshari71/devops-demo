# Number of pod replicas to run
replicaCount: 2

image:
  repository: raj1972/devops-demo
  tag: v1.0.0
  pullPolicy: IfNotPresent  # Only pull if not already on the node

service:
  type: NodePort
  port: 80
  nodePort: 30081

resources:
  requests:
    memory: "32Mi"
    cpu: "50m"
  limits:
    memory: "64Mi"
    cpu: "100m"

# Service Account
serviceAccount:
  create: false
  annotations: {}
  name: ""

# Ingress (HTTP routing) – disabled for local development
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: devops-demo.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# HTTPRoute (Gateway API) – disabled
httpRoute:
  enabled: false

# Horizontal Pod Autoscaler – disabled for local development
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80